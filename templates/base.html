<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Multilingual Intelligibility Test{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">Multilingual Intelligibility Test</a>
    <div class="nav-links">
      <a href="/record" class="{% if request.path.startswith('/record') %}active{% endif %}">Record</a>
      <a href="/transcribe" class="{% if request.path.startswith('/transcribe') %}active{% endif %}">Transcribe</a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
